  <!-- Step deltas -->
  <text class="muted" x="270" y="584" text-anchor="middle" font-size="12">−61.7%</text>
  <text class="muted" x="410" y="584" text-anchor="middle" font-size="12">−9.9%</text>
  <text class="muted" x="550" y="584" text-anchor="middle" font-size="12">−16.2%</text>
  <text class="muted" x="690" y="584" text-anchor="middle" font-size="12">−55.6%</text>
  <text class="muted" x="830" y="584" text-anchor="middle" font-size="12">−34.2%</text>
  <text class="muted" x="970" y="584" text-anchor="middle" font-size="12">−33.4%</text>
  <text class="muted" x="1110" y="584" text-anchor="middle" font-size="12">−92.8% vs baseline</text>

  <!-- Step labels: what changed at each action -->
  <text class="text2" x="130" y="606" text-anchor="middle" font-size="13" font-weight="600">1 · Identity</text>
  <text class="muted" x="130" y="623" text-anchor="middle" font-size="12">provisional mapping</text>
  <text class="muted" x="130" y="639" text-anchor="middle" font-size="12">11/11 episodes clip</text>

  <text class="text2" x="270" y="606" text-anchor="middle" font-size="13" font-weight="600">2 · Source adapter</text>
  <text class="muted" x="270" y="623" text-anchor="middle" font-size="12">free signs + offsets</text>
  <text class="muted" x="270" y="639" text-anchor="middle" font-size="12">rejected: implausible</text>

  <text class="text2" x="410" y="606" text-anchor="middle" font-size="13" font-weight="600">3 · Board relabel</text>
  <text class="muted" x="410" y="623" text-anchor="middle" font-size="12">categorical 180° fix</text>
  <text class="muted" x="410" y="639" text-anchor="middle" font-size="12">from C922 view match</text>

  <text class="text2" x="550" y="606" text-anchor="middle" font-size="13" font-weight="600">4 · Planar board fit</text>
  <text class="muted" x="550" y="623" text-anchor="middle" font-size="12">center −11, −66 mm</text>
  <text class="muted" x="550" y="639" text-anchor="middle" font-size="12">yaw 184.9°</text>

  <text class="text2" x="690" y="606" text-anchor="middle" font-size="13" font-weight="600">5 · Joint offsets</text>
  <text class="muted" x="690" y="623" text-anchor="middle" font-size="12">identity signs,</text>
  <text class="muted" x="690" y="639" text-anchor="middle" font-size="12">bounded zero offsets</text>

  <text class="text2" x="830" y="606" text-anchor="middle" font-size="13" font-weight="600">6 · Height + timing</text>
  <text class="muted" x="830" y="623" text-anchor="middle" font-size="12">base-height + reopen</text>
  <text class="muted" x="830" y="639" text-anchor="middle" font-size="12">nuisance terms</text>

  <text class="text2" x="970" y="606" text-anchor="middle" font-size="13" font-weight="600">7 · Lift-dominant</text>
  <text class="muted" x="970" y="623" text-anchor="middle" font-size="12">18.7° shoulder-lift</text>
  <text class="muted" x="970" y="639" text-anchor="middle" font-size="12">offset + board fit</text>

  <text class="text2" x="1110" y="606" text-anchor="middle" font-size="13" font-weight="600">Held-out check</text>
  <text class="muted" x="1110" y="623" text-anchor="middle" font-size="12">frozen candidate,</text>
  <text class="muted" x="1110" y="639" text-anchor="middle" font-size="12">2 sealed episodes</text>

