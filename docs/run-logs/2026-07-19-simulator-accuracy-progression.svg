<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">Simulator spatial error across sequential optimization actions, task consequences, and the planned path to normalized GR00T training data</title>
  <desc id="desc">Panel one: training-side event RMS error falls from 309.6 millimeters for the provisional identity mapping to 17.4 millimeters for the lift-dominant offset candidate, a 94.4 percent reduction across seven staged actions, with a one-time held-out check at 23.5 millimeters under the declared 60 millimeter kinematic-admission threshold. Panel two: selected-piece contact rises from zero to nine of eleven episodes and lift to one of eleven, while full pawn-move success remains zero everywhere. Panel three: the planned pipeline from the frozen workcell candidate through committed receipts, regenerated B-through-G episodes, and a frozen normalized dataset to a GR00T N1.7 fine-tune; only the first stage has working-receipt evidence today.</desc>
  <style>
    :root { color-scheme: light dark; }
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    .bg { fill: #fcfcfb; }
    .grid { stroke: #e1e0d9; stroke-width: 1; }
    .axis { stroke: #c3c2b7; stroke-width: 1; }
    .refline { stroke: #898781; stroke-width: 1; }
    .split-link { stroke: #898781; stroke-width: 1.5; stroke-dasharray: 2 6; fill: none; stroke-linecap: round; }
    .text { fill: #0b0b0b; }
    .text2 { fill: #52514e; }
    .muted { fill: #898781; }
    .phase { fill: #898781; letter-spacing: 0.08em; }
    .committed-line { fill: none; stroke: #2a78d6; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .working-line { fill: none; stroke: #2a78d6; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 7; }
    .committed-point { fill: #2a78d6; stroke: #fcfcfb; stroke-width: 2; }
    .working-point { fill: #fcfcfb; stroke: #2a78d6; stroke-width: 2.5; }
    .holdout-point { fill: #2a78d6; stroke: #fcfcfb; stroke-width: 2; }
    .bar-contact { fill: #2a78d6; }
    .bar-lift { fill: #008300; }
    .chip { fill: #f0efec; stroke: rgba(11,11,11,0.10); }
    .flow-done { fill: #f0efec; stroke: rgba(11,11,11,0.18); }
    .flow-plan { fill: none; stroke: #898781; stroke-dasharray: 5 4; }
    .arrow { stroke: #898781; stroke-width: 1.5; fill: none; }
    .arrowhead { fill: #898781; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a19; }
      .grid { stroke: #2c2c2a; }
      .axis { stroke: #383835; }
      .refline, .split-link { stroke: #898781; }
      .text { fill: #ffffff; }
      .text2 { fill: #c3c2b7; }
      .committed-line, .working-line { stroke: #3987e5; }
      .committed-point { fill: #3987e5; stroke: #1a1a19; }
      .working-point { fill: #1a1a19; stroke: #3987e5; }
      .holdout-point { fill: #3987e5; stroke: #1a1a19; }
      .bar-contact { fill: #3987e5; }
      .chip { fill: #262624; stroke: rgba(255,255,255,0.10); }
      .flow-done { fill: #262624; stroke: rgba(255,255,255,0.18); }
    }
  </style>

  <rect class="bg" width="1200" height="1000" rx="18"/>

  <!-- Header -->
  <text class="text" x="50" y="44" font-size="22" font-weight="600">Sequential simulator spatial-error progression</text>
  <text class="text2" x="50" y="68" font-size="13.5">Training-side event RMS (mm) per optimization action · lower is better</text>
  <text class="text2" x="50" y="86" font-size="13.5">11 replay episodes · 22 gripper close/reopen events</text>

  <rect class="chip" x="702" y="22" width="140" height="66" rx="12"/>
  <text class="muted" x="772" y="45" text-anchor="middle" font-size="11" letter-spacing="0.06em">TOTAL REDUCTION</text>
  <text class="text" x="772" y="74" text-anchor="middle" font-size="24" font-weight="600">94.4%</text>
  <rect class="chip" x="856" y="22" width="140" height="66" rx="12"/>
  <text class="muted" x="926" y="45" text-anchor="middle" font-size="11" letter-spacing="0.06em">HELD-OUT RMS</text>
  <text class="text" x="926" y="74" text-anchor="middle" font-size="24" font-weight="600">23.5 mm</text>
  <rect class="chip" x="1010" y="22" width="140" height="66" rx="12"/>
