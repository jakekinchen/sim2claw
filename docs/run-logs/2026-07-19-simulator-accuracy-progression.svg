  <text class="text" x="50" y="676" font-size="16" font-weight="600">Task consequences under each candidate — spatial fit is necessary, not sufficient</text>
  <text class="text2" x="50" y="696" font-size="13">Fraction of replay episodes · full pawn-move success remains 0 in every configuration</text>
